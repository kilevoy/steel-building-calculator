<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Предварительный расчет здания: подбор колонн и прогонов с инженерной логикой и сверкой с Excel-методикой."
    />
    <meta name="theme-color" content="#121920" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
    <title>Предварительный расчет здания</title>
    <script>
      // Paint the page in the active theme before React mounts to avoid a light flash.
      try {
        var savedTheme = localStorage.getItem('metalcalc-theme') || 'dark'
        document.documentElement.style.backgroundColor =
          savedTheme === 'dark' ? '#0f1419' : '#eef0f2'
      } catch (error) {
        /* localStorage unavailable — keep default background */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
